services:
  postgres:
    image: postgres:16
    container_name: diting-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: diting
      POSTGRES_USER: diting
      POSTGRES_PASSWORD: diting
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ../backend/migrations/postgres:/docker-entrypoint-initdb.d:ro

  clickhouse:
    image: clickhouse/clickhouse-server:24.8
    container_name: diting-clickhouse
    restart: unless-stopped
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - clickhouse-data:/var/lib/clickhouse
      - ../backend/migrations/clickhouse:/docker-entrypoint-initdb.d:ro

volumes:
  postgres-data:
  clickhouse-data:
